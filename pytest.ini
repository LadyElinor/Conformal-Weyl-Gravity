[pytest]
addopts = -m "not slow"
markers =
    slow: heavy symbolic computations (constraint discovery); order-sensitive under global sympy cache growth
# default (CI):      pytest -q            -> quick suite, slow deselected
# slow receipt lane: pytest -q -m slow    -> family constraint test, isolated
# never run the full suite in one process on constrained CI; the slow test
# is order-sensitive when sympy's global cache has grown from earlier tests.
